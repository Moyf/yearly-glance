name: Release Obsidian plugin

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
    contents: write
    id-token: write
    attestations: write

env:
    PLUGIN_ID: yearly-glance

jobs:
    build:
        runs-on: ubuntu-22.04

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Use Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "20.x"

            - name: Prepare manifest
              run: |
                  if [[ ${{ github.ref }} == *"beta"* ]]; then
                    cp manifest-beta.json manifest.json
                  fi

            - name: Build
              run: |
                  npm install -g yarn
                  yarn
                  yarn run build --if-present

            - name: Generate Changelog
              id: changelog
              run: |
                  CHANGELOG_EN="CHANGELOG.md"
                  CURRENT_VERSION=$(git tag --sort version:refname | tail -n 1)
                  echo "Current version: $CURRENT_VERSION"

                  extract_changelog() {
                    local changelog_file=$1
                    local output_file=$2
                    local target_version=$3

                    > "$output_file"

                    awk -v version="$target_version" '
                    BEGIN { found = 0; printing = 0; }
                    (($0 ~ /^# / || $0 ~ /^## /) && index($0, "[" version "]") > 0) { found = 1; printing = 1; next; }
                    printing && ($0 ~ /^# / || $0 ~ /^## /) { printing = 0; }
                    printing && $0 ~ "^---" { printing = 0; }
                    printing { print; }
                    END {
                      if (!found) print "Warning: Version " version " not found" > "/dev/stderr";
                    }' "$changelog_file" > "temp_version_content.md"

                    if [ ! -s "temp_version_content.md" ]; then
                      echo -e "## Changes\n\nNo changelog found for version $target_version.\n" >> "$output_file"
                    else
                      cat "temp_version_content.md" >> "$output_file"
                    fi
                  }

                  if [ -f "$CHANGELOG_EN" ]; then
                    extract_changelog "$CHANGELOG_EN" "en_changelog.md" "$CURRENT_VERSION"
                  else
                    echo "No changelog available." > "en_changelog.md"
                  fi

                  echo "changelog<<EOF" >> $GITHUB_OUTPUT
                  cat "en_changelog.md" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Attest build provenance
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      main.js
                      styles.css
                      manifest.json

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref }}
                  name: ${{ github.ref_name }}
                  draft: false
                  prerelease: ${{ contains(github.ref, 'beta') }}
                  body: ${{ steps.changelog.outputs.changelog }}
                  files: |
                      main.js
                      manifest.json
                      styles.css
