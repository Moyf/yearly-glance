name: CI Build

on:
    workflow_dispatch:

permissions:
    contents: read

env:
    PLUGIN_ID: yearly-glance

jobs:
    build:
        runs-on: ubuntu-22.04

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "20.x"

            - name: Build
              run: |
                  npm ci --legacy-peer-deps
                  npm run build

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ env.PLUGIN_ID }}-build-${{ github.run_number }}
                  path: |
                      main.js
                      styles.css
                      manifest.json
                  retention-days: 7
